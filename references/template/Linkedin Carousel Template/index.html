<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>LinkedIn Carousel — Structural Irreplaceability</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="design-system/colors_and_type.css" />
    <style>
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: #f0eee9;
        font-family: var(--font-sans);
        color: var(--fg-1);
      }
      #root { width: 100%; height: 100vh; }
      /* Image-slot placeholder styling — match the editorial palette */
      image-slot {
        --image-slot-bg: var(--bg-muted);
        --image-slot-border: var(--border);
        --image-slot-fg: var(--fg-3);
        background: var(--bg-muted);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- React + Babel -->
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

    <!-- web components -->
    <script src="image-slot.js"></script>

    <!-- app -->
    <script type="text/babel" src="design-canvas.jsx"></script>
    <script type="text/babel" src="slide-frame.jsx"></script>
    <script type="text/babel" src="slides-bold.jsx"></script>
    <script type="text/babel" src="slides-variants-a.jsx"></script>
    <script type="text/babel" src="slides-variants-b.jsx"></script>
    <script type="text/babel" src="slides-variants-c.jsx"></script>
    <script type="text/babel" src="slides-v12-playful.jsx"></script>
    <script type="text/babel" src="app.jsx"></script>
  </body>
</html>
